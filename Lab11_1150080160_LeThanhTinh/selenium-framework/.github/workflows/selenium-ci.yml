name: Selenium Matrix CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Setup Java
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Run test với Secrets
      - name: Run test
        env:
          SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
        run: mvn test -Dbrowser=${{ matrix.browser }} -Denv=dev -DsuiteXmlFile=testng-smoke.xml

      - name: Check secret mask
        env:
          SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
        run: echo $SAUCEDEMO_PASSWORD

      # Upload artifact khi fail
      - name: Upload artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/screenshots/